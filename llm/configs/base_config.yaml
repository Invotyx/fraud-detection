# LLM Training Configuration — Shared Base
# Override per-run in run1_config.yaml / run2_config.yaml
#
# Hardware target: 4× NVIDIA T4 (16 GB each, 64 GB total) on g4dn.12xlarge
# Strategy: fp16 LoRA + FSDP full_shard — no quantization needed with 4 GPUs
#   Each GPU holds 1/4 of the model (~4 GB) plus activations and grad buffers.
#   Effective batch = per_device_train_batch_size × num_gpus × gradient_accumulation_steps
#                   = 1 × 4 × 4 = 16  (same as previous single-GPU QLoRA baseline)

model:
  base_model_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  fallback_model_id: "mistralai/Mistral-7B-Instruct-v0.3"
  max_seq_length: 2048
  trust_remote_code: false

# FSDP (Fully Sharded Data Parallel) — distributes model params across all GPUs.
# use_orig_params=True is required for LoRA (preserves frozen/trainable param split).
# min_num_params=1e8 wraps each Llama/Mistral decoder layer (~134M params) individually.
fsdp:
  enabled: true
  strategy: "full_shard auto_wrap"
  min_num_params: 100000000 # 100M — wraps each decoder layer
  backward_prefetch: "backward_pre"
  forward_prefetch: false
  offload_params: false
  use_orig_params: true
  sync_module_states: true # rank-0 broadcasts weights; other ranks skip disk I/O

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "checkpoints/run1"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4 # 4 GPUs × 4 steps = 16 effective (matches QLoRA baseline)
  num_train_epochs: 3
  learning_rate: 2.0e-4
  fp16: true
  bf16: false
  gradient_checkpointing: true
  optim: "adamw_torch" # paged_adamw_32bit requires bitsandbytes; use standard AdamW
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  logging_steps: 25
  save_steps: 100
  eval_steps: 100
  evaluation_strategy: "steps" # re-enabled: FSDP gives enough VRAM headroom for eval
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "wandb" # set to "none" to disable W&B

data:
  train_file: "llm/data/train.jsonl"
  val_file: "llm/data/val.jsonl"
  test_file: "llm/data/test.jsonl"
  prompt_template: "llm/prompts/system_prompt.txt"

experiment:
  wandb_project: "fraud-detection-llm"
  wandb_run_name: "run1-resilience"
  seed: 42
