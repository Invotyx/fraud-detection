thresholds:
  allow: 0.3       # unified_score < this  → allow
  review: 0.7      # allow <= score < this  → review (HITL)
  # score >= review → block

  # Hard overrides – any single parameter above this → immediate block
  hard_block_single_param: 0.90

hard_block_rules:
  - url_blocklist_match        # immediate block if URL found in blocklist
  - injection_rule_match       # immediate block if rule-based injection detected
