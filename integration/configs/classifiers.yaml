# =============================================================================
# Classifier-specific configuration
# Tuning knobs for ML/rule-based classifiers.
# Infrastructure settings (URLs, ports, credentials) belong in .env instead.
# =============================================================================

# ---------------------------------------------------------------------------
# Shared embedding configuration
# Changing model_id requires a new Alembic migration to update the vector
# column dimension (embedding_dim) in session_embeddings and fraud_patterns.
# ---------------------------------------------------------------------------
embeddings:
  model_id: "all-mpnet-base-v2" # upgraded from all-MiniLM-L6-v2 (384-dim → 768-dim)
  dim: 768 # must match model output dimension
  session_ttl_seconds: 3600 # seconds before session embeddings expire in pgvector
  turn_history_max: 20 # maximum turns stored per session

# ---------------------------------------------------------------------------
# RAG — fraud pattern retrieval
# ---------------------------------------------------------------------------
rag:
  enabled: true
  top_k: 3 # number of similar fraud patterns to retrieve
  min_similarity_threshold: 0.65 # cosine similarity floor for retrieval
  max_context_tokens: 500 # approximate token budget for RAG prefix
  seed_on_startup: true # seed fraud_patterns table at app startup if empty

# ---------------------------------------------------------------------------
# Context Deviation Classifier
# ---------------------------------------------------------------------------
context_deviation:
  low_similarity_threshold: 0.40 # below this → scope deviation flag
  escalation_threshold: 0.35 # baseline vs current turn → escalation flag
  cross_session_lookback_seconds: 300 # window for coordinated attack detection
  cross_session_top_k: 5 # similar sessions to check
  cross_session_min_similarity: 0.85 # very high threshold to avoid false positives

# ---------------------------------------------------------------------------
# Ensemble Models
# ---------------------------------------------------------------------------
ensemble:
  models:
    rule_url_risk:
      weight: 0.30
      timeout_seconds: 1.0
    keyword_fraud:
      weight: 0.30
      timeout_seconds: 1.0
    xgboost_transaction:
      weight: 0.40
      timeout_seconds: 2.0
      # Path to trained XGBoost model artefact (.ubj or .json).
      # Leave empty until the model is trained — ensemble degrades gracefully.
      model_path: "" # e.g. "checkpoints/xgboost_fraud_v1.ubj"

  # Keyword fraud scorer
  fraud_keywords:
    - "urgent"
    - "immediate action"
    - "verify your account"
    - "click here now"
    - "limited time"
    - "you have won"
    - "suspended"
    - "confirm your identity"
    - "unauthorized access"
    - "prince"
    - "inheritance"
    - "wire transfer"
    - "gift card"
  keyword_score_increment: 0.12 # score added per matching keyword

# ---------------------------------------------------------------------------
# URL / Domain Risk Classifier
# ---------------------------------------------------------------------------
url_risk:
  entropy_threshold: 3.5 # Shannon entropy above this → DGA-like
  domain_age_threshold_days: 30 # domains younger than this → elevated risk
  lookalike_distance_threshold: 2 # Levenshtein distance for brand lookalike

  # TLDs that are either free (Freenom) or heavily abused in regional phishing
  # e.g. ecodfu-ps.cc/pk  →  suspicious_tld flag
  suspicious_tlds:
    - "cc"
    - "tk"
    - "ml"
    - "ga"
    - "cf"
    - "gq"

  score_weights:
    blocklisted: 1.0
    direct_ip: 0.85
    young_domain: 0.60
    high_entropy: 0.55
    suspicious_tld: 0.55
    asn_country_mismatch: 0.65
    lookalike: 0.70
    shortener: 0.40

  url_shorteners:
    - "bit.ly"
    - "tinyurl.com"
    - "goo.gl"
    - "ow.ly"
    - "t.co"
    - "buff.ly"
    - "short.link"
    - "rb.gy"
    - "cutt.ly"
    - "tiny.cc"
    - "is.gd"
    - "v.gd"
    - "bl.ink"
    - "shorturl.at"

  brand_domains:
    - "paypal.com"
    - "apple.com"
    - "google.com"
    - "microsoft.com"
    - "amazon.com"
    - "facebook.com"
    - "twitter.com"
    - "instagram.com"
    - "netflix.com"
    - "linkedin.com"
    - "dropbox.com"
    - "github.com"
    - "bankofamerica.com"
    - "chase.com"
    - "wellsfargo.com"
    - "americanexpress.com"
    - "visa.com"
    - "mastercard.com"
    - "yahoo.com"
    - "gmail.com"
    - "outlook.com"
    - "icloud.com"
    # Pakistan government / payment portals
    - "punjab.gov.pk"
    - "epay.punjab.gov.pk"
    - "psca.gop.pk"
    - "punjabpolice.gov.pk"
    - "fbr.gov.pk"
    - "nadra.gov.pk"
    - "ecp.gov.pk"
    - "sbp.org.pk"
    - "hbl.com"
    - "mcb.com.pk"
    - "ubldigital.com"
    - "jazzcash.com.pk"
    - "easypaisa.com.pk"

# ---------------------------------------------------------------------------
# Authority Spoof Classifier
# Detects messages that (a) claim to be from a bank / government and contain
# a payment link, or (b) ask the recipient to share sensitive credentials.
# Both patterns are globally universal — not region-specific.
# ---------------------------------------------------------------------------
authority_spoof:
  score_weights:
    # Claimed authority + URL + CTA (click/pay/verify/settle here)
    authority_link: 0.72
    # Message asks recipient to share OTP, PIN, password, card/account number, etc.
    sensitive_info_request: 0.80

  # Override the authority keyword list here if needed.
  # Defaults (in authority_spoof.py) cover banks, payment apps, and government
  # agencies across US/UK/AU/CA/PK/IN — extend here without code changes.
  authority_keywords: []   # empty = use classifier defaults
