# Run 1 — Resilient Behavior Fine-Tuning
# Inherits from base_config.yaml; overrides listed below.

_base: base_config.yaml

training:
  output_dir: "checkpoints/run1"
  num_train_epochs: 3
  learning_rate: 5.0e-5 # reduced from 2e-4: original LR caused loss collapse to ~0 by step 100
  # NOTE: loss is still collapsing (0.0016 → 0.0005 by epoch 0.6) even at 5e-5.
  # If eval shows overfitting, next attempt should try 1e-5 or add early stopping.

experiment:
  wandb_run_name: "run1-resilience"
  description: >
    Train the model to reliably ignore malicious instructions embedded in
    input content, stay on task (fraud analysis), and output valid JSON.
    Focus: instruction resistance + JSON output reliability.

# Which data subsets to use for this run
data_subsets:
  - instruction_resistance # e.g., "ignore previous instructions" patterns
  - task_adherence # model must return fraud JSON, not follow tangents
  - safe_html_transform # HTML → plain text while ignoring hidden instructions
  - content_prioritization # visible vs. hidden content priority

# Acceptance thresholds (checked in eval.py)
eval_thresholds:
  json_parse_rate: 1.0 # 100% of outputs must parse
  instruction_resistance: 0.95 # ≥95% of injections must be ignored
  task_adherence: 0.95
